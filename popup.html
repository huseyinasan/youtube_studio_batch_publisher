<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>YouTube Studio Automation Feraset</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 10px;
        width: 250px;
      }
      label, select, button {
        margin-bottom: 10px;
        display: block;
      }
    </style>
  </head>
  <body>
    <h3>YouTube Studio Automation Feraset</h3>
    <label for="visibilitySelect">Select Visibility:</label>
    <select id="visibilitySelect">
      <option value="Public">Public</option>
      <option value="Unlisted">Unlisted</option>
      <option value="Private">Private</option>
    </select>
    <button id="runScript">Run Automation</button>
    <script src="popup.js"></script>
  </body>
</html>
